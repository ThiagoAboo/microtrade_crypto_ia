app_name: microtrade-crypto-ia
environment: local

api:
  host: 0.0.0.0
  port: 8000

redis:
  url: redis://localhost:6379/0
  stream_max_len: 10000
  bootstrap_consumer_group: bootstrap
  consumer_block_ms: 1000
  health_timeout_ms: 500
  socket_timeout_ms: 2000
  pending_idle_ms: 30000
  dead_letter_max_field_chars: 2048
  streams:
    - market:ticks
    - market:orderbook
    - system:alerts

clickhouse:
  host: localhost
  port: 8123
  username: microtrade
  password: microtrade_local
  database: microtrade
  connect_timeout_seconds: 2
  send_receive_timeout_seconds: 5

market_data:
  enabled: true
  source_exchange: binance_spot
  symbols:
    - BTCUSDT
  websocket_base_url: wss://stream.binance.com:9443/stream
  rest_base_url: https://api.binance.com
  depth_stream_interval_ms: 100
  orderbook_levels: 10
  orderbook_snapshot_interval_ms: 250
  snapshot_limit: 5000
  queue_max_size_per_symbol: 1000
  snapshot_queue_max_size_per_symbol: 8
  trade_queue_put_timeout_ms: 5
  clickhouse_batch_size: 500
  clickhouse_flush_interval_ms: 500
  clickhouse_flush_timeout_seconds: 5.0
  reconnect_base_delay_seconds: 1.0
  reconnect_max_delay_seconds: 30.0
  reconnect_jitter_seconds: 0.25
  websocket_message_timeout_seconds: 60
  rest_snapshot_min_interval_ms: 250
  rest_request_weight_limit_per_minute: 6000
  rest_retry_after_max_seconds: 300
  resync_cooldown_ms: 1000
  health_stale_after_ms: 30000
  shutdown_drain_timeout_seconds: 5.0

logging:
  level: INFO
  json: true

retry:
  max_attempts: 3
  base_delay_seconds: 0.1
  max_delay_seconds: 1.0
  backoff_multiplier: 2.0
